name: Deploy Staging

on:
  push:
    branches:
      - stg
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy staging
    runs-on:
      - self-hosted
      - fuma-lab
    environment:
      name: staging
      url: ${{ vars.STAGING_SITE_URL || 'https://stg.t3s7.com' }}
    env:
      STAGING_SITE_URL: ${{ vars.STAGING_SITE_URL || 'https://stg.t3s7.com' }}
      STAGING_DOCS_PORT: ${{ vars.STAGING_DOCS_PORT || '3001' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create staging env file
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          mkdir -p envs
          {
            printf 'COMPOSE_PROJECT_NAME=fuma-lab-stg\n'
            printf 'DOCS_IMAGE=fuma-lab:stg\n'
            printf 'SITE_URL=%s\n' "${STAGING_SITE_URL}"
            printf 'DOCS_PORT=%s\n' "${STAGING_DOCS_PORT}"
            printf 'ROBOTS_NOINDEX=1\n'
          } > envs/staging.env

      - name: Deploy staging
        run: bash scripts/deploy.sh --env staging
