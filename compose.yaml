# Default project name is a throwaway local sandbox, NOT production. A bare
# `docker compose up` here starts an isolated stack (project fuma-lab-local,
# port 3009) that cannot touch production. Real environments are explicit:
#   production -> scripts/deploy.sh --env production (fuma-lab, :3000)
#   staging    -> scripts/deploy.sh --env staging (fuma-lab-stg, :3001)
name: fuma-lab-local

services:
  docs:
    image: ${DOCS_IMAGE:-fuma-lab:local}
    build:
      context: .
      args:
        NODE_VERSION: "24.18.0"
        SITE_URL: "${SITE_URL:-http://localhost:3000}"
        ROBOTS_NOINDEX: "${ROBOTS_NOINDEX:-}"
    restart: unless-stopped
    init: true
    ports:
      # Sandbox default is 3009; production (:3000) and staging (:3001) set
      # DOCS_PORT explicitly through environment-aware deployment.
      - "127.0.0.1:${DOCS_PORT:-3009}:3000"
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /app/.next/cache:uid=1000,gid=1000,mode=0755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    stop_grace_period: 10s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/docs').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  # Optional compose-managed Cloudflare Tunnel. Inactive unless the "tunnel"
  # profile is enabled. The default staging path uses the host cloudflared
  # service and only deploys the app on 127.0.0.1:3001. This fallback keeps the
  # token in the environment (never argv) and reads it via `cloudflared tunnel
  # run`. Its ingress must be configured in the Cloudflare dashboard as
  # stg.t3s7.com -> http://docs:3000, reachable over the compose network.
  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_VERSION:-latest}
    profiles:
      - tunnel
    restart: unless-stopped
    init: true
    command:
      - tunnel
      - --no-autoupdate
      - run
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN:-}"
    depends_on:
      docs:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    stop_grace_period: 10s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
